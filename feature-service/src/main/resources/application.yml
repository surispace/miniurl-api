server:
  port: 8083

spring:
  application:
    name: feature-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://identity-service:8085/.well-known/jwks.json}
  datasource:
    url: jdbc:mysql://${FEATURE_DB_HOST:mysql-feature}:${FEATURE_DB_PORT:3306}/feature_db
    username: ${FEATURE_DB_USER:root}
    password: ${FEATURE_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

# Swagger/OpenAPI — enabled by default (non-prod)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
