<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a1a; background: #fff;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background: #fff;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
                    <tr>
                        <td style="padding: 24px 24px 20px; border-bottom: 2px solid #28a745; text-align: center;">
                            <h1 style="margin: 0; font-size: 20px; font-weight: 600; color: #1a1a1a;">Password Reset Successful</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 24px;">
                            <p style="margin: 0 0 16px; font-size: 15px; color: #444;">Hello <strong th:text="${username}">User</strong>,</p>
                            <p style="margin: 0 0 20px; font-size: 15px; color: #444;"><strong>Your password has been reset successfully.</strong></p>
                            <!-- Warning Box -->
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="padding: 16px; border: 1px solid #ffc107; border-left: 4px solid #ffc107; border-radius: 4px;">
                                        <p style="margin: 0 0 8px; font-size: 14px; color: #444;"><strong>Did not initiate this?</strong> If you didn't request this password reset, please secure your account immediately:</p>
                                        <a th:href="${forgotPasswordLink}" style="display: inline-block; padding: 8px 20px; font-size: 14px; color: #dc3545; text-decoration: none; border: 1px solid #dc3545; border-radius: 4px;">Reset Password</a>
                                    </td>
                                </tr>
                            </table>
                            <p style="margin: 16px 0 0; font-size: 13px; color: #888;">If you have any concerns, please contact our support team.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 16px 24px; border-top: 1px solid #e0e0e0; text-align: center;">
                            <p style="margin: 0; font-size: 12px; color: #999;">&copy; <span th:text="${year}">2026</span> <span th:text="${appName}">App</span>. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
