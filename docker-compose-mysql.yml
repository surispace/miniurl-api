services:
  db:
    image: mysql:latest
    container_name: miniurl-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: miniurldb
      MYSQL_USER: miniurldbuser
      MYSQL_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - miniurl-mysql-volume:/var/lib/mysql
    networks:
      - miniurl-network

volumes:
  miniurl-mysql-volume:

networks:
  miniurl-network:
    driver: bridge
    name: miniurl-network
