{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "miniurl.labels" (dict "name" "ingress") | nindent 4 }}
  annotations:
    {{- if .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    {{- end }}
    nginx.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.sslRedirect | default "true" | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ (index (index .Values.services "api-gateway").ports 0).servicePort | default 80 }}
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: redirect-service
                port:
                  number: {{ (index (index .Values.services "redirect-service").ports 0).servicePort | default 8080 }}
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: {{ (index (index .Values.services "identity-service").ports 0).servicePort | default 8081 }}
{{- end }}
