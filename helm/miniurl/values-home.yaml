ingress:
  enabled: true
  host: miniurl.local
  className: traefik
  sslRedirect: "false"
  tls: false
  clusterIssuer: ""
  annotations: {}

canary:
  enabled: false
  weight: 10

serviceAccount:
  create: true
  name: miniurl-sa
  annotations: {}

networkPolicy:
  enabled: true
  ingressNamespace: kube-system

pdb:
  enabled: true

imagePullSecrets:
  - name: ghcr-pull-secret

resourceQuota:
  enabled: false
