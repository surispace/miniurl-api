          path: /actuator/health/readiness
          port: 8082
        initialDelaySeconds: 30
        periodSeconds: 10
    securityContext:
      fsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
