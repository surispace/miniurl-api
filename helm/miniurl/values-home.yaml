            key: MYSQL_ROOT_PASSWORD

  redirect-service:
    replicas: 1
    image:
      repository: ghcr.io/surispace/miniurl-api/redirect-service
      tag: ""
      pullPolicy: Always
    ports:
      - name: http
        containerPort: 8082
        servicePort: 8082
    serviceType: ClusterIP
    hpa:
      enabled: false
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits: { cpu: "500m", memory: "512Mi" }
    probes:
      liveness:
        httpGet:
          path: /actuator/health
          port: 8082
        initialDelaySeconds: 30
        periodSeconds: 10
      readiness:
        httpGet:
          path: /actuator/health/readiness
          port: 8082
        initialDelaySeconds: 15
        periodSeconds: 5
    securityContext:
      fsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    pdb:
      maxUnavailable: 0

  feature-service:
    replicas: 1
    image:
      repository: ghcr.io/surispace/miniurl-api/feature-service
      tag: ""
      pullPolicy: Always
    ports:
      - name: http
        containerPort: 8083
        servicePort: 8083
    serviceType: ClusterIP
    hpa:
      enabled: false
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits: { cpu: "500m", memory: "512Mi" }
    probes:
      liveness:
        httpGet:
          path: /actuator/health
          port: 8083
        initialDelaySeconds: 60
        periodSeconds: 15
      readiness:
        httpGet:
          path: /actuator/health/readiness
          port: 8083
        initialDelaySeconds: 30
        periodSeconds: 10
    securityContext:
      fsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    pdb:
