            key: MYSQL_ROOT_PASSWORD

  notification-service:
    replicas: 1
    image:
      repository: ghcr.io/surispace/miniurl-api/notification-service
      tag: ""
      pullPolicy: Always
    ports:
      - name: http
        containerPort: 8082
        servicePort: 8082
    serviceType: ClusterIP
    hpa:
      enabled: false
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits: { cpu: "500m", memory: "512Mi" }
    probes:
      liveness:
        httpGet:
          path: /actuator/health
          port: 8082
        initialDelaySeconds: 60
        periodSeconds: 15
      readiness:
