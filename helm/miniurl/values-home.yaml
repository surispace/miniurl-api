        valueFrom:
          secretKeyRef:
            name: smtp-credentials
            key: SMTP_HOST
      - name: SMTP_PORT
        valueFrom:
          secretKeyRef:
            name: smtp-credentials
            key: SMTP_PORT
      - name: SMTP_USERNAME
        valueFrom:
          secretKeyRef:
            name: smtp-credentials
            key: SMTP_USERNAME
      - name: SMTP_PASSWORD
        valueFrom:
