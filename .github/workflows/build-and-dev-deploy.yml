name: Build and Dev Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'SETUP_GUIDE.md'
      - 'docs/**'
      - 'plans/**'
      - 'image-tags-dev.yaml'
      - 'pending-releases.yaml'
      - 'release-tags.yaml'
      - 'prod-deployments.yaml'

concurrency:
  group: dev-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  REGISTRY: docker.io

permissions:
  contents: write
  packages: write

jobs:
  # ── Step 1: Detect Changed Services ─────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services_json: ${{ steps.changes.outputs.services_json }}
      services_list: ${{ steps.changes.outputs.services_list }}
      short_sha: ${{ steps.changes.outputs.short_sha }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        run: |
          SERVICES=()
          for file in $(git diff --name-only HEAD^ HEAD); do
            case "$file" in
              identity-service/*)       SERVICES+=("identity-service") ;;
              url-service/*)            SERVICES+=("url-service") ;;
              redirect-service/*)       SERVICES+=("redirect-service") ;;
              feature-service/*)        SERVICES+=("feature-service") ;;
              notification-service/*)   SERVICES+=("notification-service") ;;
              analytics-service/*)      SERVICES+=("analytics-service") ;;
              api-gateway/*)            SERVICES+=("api-gateway") ;;
              eureka-server/*)          SERVICES+=("eureka-server") ;;
              common/*|pom.xml|Dockerfile)
                SERVICES=("eureka-server" "api-gateway" "identity-service" "url-service" "redirect-service" "feature-service" "notification-service" "analytics-service")
                break
                ;;
            esac
          done

          UNIQUE=($(printf '%s\n' "${SERVICES[@]}" | sort -u))
          SHORT_SHA="${GITHUB_SHA::8}"

          if [ ${#UNIQUE[@]} -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No service changes detected"
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "services_json=$(echo "${UNIQUE[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT
          echo "services_list=${UNIQUE[*]}" >> $GITHUB_OUTPUT
          echo "Detected changes in: ${UNIQUE[*]}"

  # ── Step 2: Build and Push Dev Images ───────────────────────────
  build-dev-images:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services_json) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_API_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/miniurl-api:${{ matrix.service }}-dev-${{ needs.detect-changes.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: Update Dev Image Tags State File ────────────────────
  update-dev-tags:
    needs: [detect-changes, build-dev-images]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image-tags-dev.yaml
        run: |
          python3 << 'PYTHON'
          import yaml, json, os
          from datetime import datetime, timezone

          services = json.loads('${{ needs.detect-changes.outputs.services_json }}')
          short_sha = '${{ needs.detect-changes.outputs.short_sha }}'
          full_sha = '${{ github.sha }}'
          timestamp = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')

          dev_file = 'image-tags-dev.yaml'
          if os.path.exists(dev_file):
              with open(dev_file, 'r') as f:
                  data = yaml.safe_load(f) or {'services': {}}
          else:
              data = {'services': {}}

          for service in services:
              if service not in data['services']:
                  data['services'][service] = {}
              data['services'][service]['dev_tag'] = f'{service}-dev-{short_sha}'
              data['services'][service]['image'] = f'{service}-dev-{short_sha}'
              data['services'][service]['updatedAt'] = timestamp
              data['services'][service]['commitSha'] = full_sha
              data['services'][service]['status'] = 'dev'

          with open(dev_file, 'w') as f:
              f.write('# Dev image tags - auto-generated by build-and-dev-deploy.yml\n')
              yaml.dump(data, f, default_flow_style=False)

          print(f"Updated {len(services)} services in image-tags-dev.yaml")
          PYTHON

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add image-tags-dev.yaml
          git commit -m "chore(dev): update dev image tags [skip ci]"
          git push

  # ── Step 4: Track Pending Release ───────────────────────────────
  track-pending-release:
    needs: [detect-changes, update-dev-tags]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update pending-releases.yaml
        run: |
          python3 << 'PYTHON'
          import yaml, json, os
          from datetime import datetime, timezone

          services = json.loads('${{ needs.detect-changes.outputs.services_json }}')
          short_sha = '${{ needs.detect-changes.outputs.short_sha }}'
          timestamp = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')

          pending_file = 'pending-releases.yaml'
          if os.path.exists(pending_file):
              with open(pending_file, 'r') as f:
                  data = yaml.safe_load(f) or {'pending': []}
          else:
              data = {'pending': []}

          for service in services:
              entry = {
                  'service': service,
                  'dev_tag': f'{service}-dev-{short_sha}',
                  'commitSha': '${{ github.sha }}',
                  'pendingSince': timestamp,
                  'status': 'pending-release'
              }
              # Remove existing entry for this service (update)
              data['pending'] = [s for s in data['pending'] if s['service'] != service]
              data['pending'].append(entry)

          with open(pending_file, 'w') as f:
              f.write('# Pending releases - awaiting promotion to release\n')
              yaml.dump(data, f, default_flow_style=False)

          print(f"Tracking {len(services)} pending releases")
          PYTHON

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending-releases.yaml
          git commit -m "chore(release): track pending releases [skip ci]"
          git push

  # ── Step 5: Deploy to Dev (Self-Hosted Runner) ──────────────────
  deploy-dev:
    needs: [detect-changes, build-dev-images]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: [self-hosted, home-server]
    environment:
      name: development
    steps:
      - uses: actions/checkout@v4

      - name: Preflight — verify runner tools and K3s access
        run: |
          echo "=== Runner Preflight ==="
          echo "--- helm ---"
          helm version --short 2>/dev/null || { echo "FATAL: helm not found"; exit 1; }
          echo "--- kubeconfig ---"
          echo "Current context: $(kubectl config current-context 2>/dev/null || echo 'NOT SET')"
          echo "--- cluster ---"
          kubectl cluster-info 2>/dev/null || true
          kubectl get nodes 2>/dev/null || { echo "FATAL: Cannot access K3s cluster"; exit 1; }
          echo "=== Preflight PASSED ==="

      - name: Create image pull secret for Docker Hub
        run: |
          kubectl -n miniurl create secret docker-registry dockerhub-pull-secret \
            --docker-server=docker.io \
            --docker-username="${{ secrets.DOCKER_USER }}" \
            --docker-password="${{ secrets.DOCKER_API_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Docker Hub pull secret created/updated"

      - name: Deploy changed services to Dev with Helm
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services_list }}'
          SHORT_SHA='${{ needs.detect-changes.outputs.short_sha }}'

          SET_ARGS=""
          for service in $SERVICES; do
            TAG="${service}-dev-${SHORT_SHA}"
            SET_ARGS="$SET_ARGS --set services.${service}.image.tag=${TAG}"
          done

          helm upgrade --install miniurl ./helm/miniurl \
            --values ./helm/miniurl/values-home.yaml \
            $SET_ARGS \
            --namespace miniurl \
            --create-namespace \
            --timeout 10m \
            --wait \
            --atomic

      - name: Verify changed service deployments
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services_list }}'
          for service in $SERVICES; do
            echo "Checking ${service}..."
            kubectl -n miniurl rollout status "deployment/${service}" --timeout=120s || true
          done

      - name: Smoke test
        run: |
          echo "=== MiniURL Dev Smoke Test ==="
          kubectl -n miniurl get pods -o wide

          GW_IP=$(kubectl -n miniurl get svc api-gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -z "$GW_IP" ]; then
            GW_IP=$(kubectl -n miniurl get svc api-gateway -o jsonpath='{.spec.clusterIP}')
          fi
          if [ -n "$GW_IP" ]; then
            echo "--- API Gateway @ ${GW_IP} ---"
            curl -fsS "http://${GW_IP}/actuator/health" || echo "WARN: Health check failed"
          fi

          echo "=== Smoke Test Complete ==="

      - name: Print access info
        run: |
          echo "============================================"
          echo "  Dev Deploy Complete"
          echo "============================================"
          echo "Commit: ${{ github.sha }}"
          echo "Changed services: ${{ needs.detect-changes.outputs.services_list }}"
          echo ""
          echo "Services:"
          kubectl -n miniurl get svc
