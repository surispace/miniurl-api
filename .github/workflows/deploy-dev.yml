name: Deploy to Development

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - 'SETUP_GUIDE.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Specific image tag to deploy (default: sha-{short_sha})'
        required: false
        type: string

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ── Build & push on GitHub-hosted runner (no cluster access needed) ──
  build-and-push:
    name: Build and Push Images (sha tag)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_tag == ''

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - identity-service
          - url-service
          - redirect-service
          - feature-service
          - notification-service
          - analytics-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: meta
        run: |
          SHA_TAG="sha-${GITHUB_SHA::8}"
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      sha_tag:
        description: 'SHA-based image tag'
        value: ${{ steps.meta.outputs.sha_tag }}

  # ── Deploy on home-server self-hosted runner (outbound-only to GitHub) ──
  deploy:
    name: Deploy to Dev
    runs-on: [self-hosted, home-server]
    needs: build-and-push
    if: |
      always() &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    environment:
      name: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Preflight — verify runner tools and K3s access
        run: |
          echo "=== Runner Preflight ==="
          echo ""
          echo "--- kubectl ---"
          kubectl version --client 2>/dev/null || true
          echo ""
          echo "--- helm ---"
          helm version --short 2>/dev/null || { echo "FATAL: helm not found"; exit 1; }
          echo ""
          echo "--- kubeconfig ---"
          echo "KUBECONFIG: ${KUBECONFIG:-$HOME/.kube/config}"
          echo "Current context: $(kubectl config current-context 2>/dev/null || echo 'NOT SET')"
          echo ""
          echo "--- cluster ---"
          kubectl cluster-info 2>/dev/null || true
          kubectl get nodes 2>/dev/null || { echo "FATAL: Cannot access K3s cluster"; exit 1; }
          echo ""
          echo "=== Preflight PASSED ==="

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ needs.build-and-push.outputs.sha_tag }}" ]; then
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.sha_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Create image pull secret for ghcr.io
        run: |
          kubectl -n miniurl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Image pull secret created/updated"

      - name: Deploy with Helm
        run: |
          helm upgrade --install miniurl ./helm/miniurl \
            --values ./helm/miniurl/values-home.yaml \
            --set globalConfig.IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}" \
            --namespace miniurl \
            --create-namespace \
            --timeout 5m \
            --wait \
            --atomic

      - name: Verify deployments
        run: |
          kubectl -n miniurl get all
          for service in api-gateway eureka-server identity-service url-service redirect-service feature-service notification-service analytics-service; do
            echo "Checking ${service}..."
            kubectl -n miniurl rollout status "deployment/${service}" --timeout=120s || true
          done

      - name: Smoke test
        run: |
          echo "=== MiniURL Dev Smoke Test ==="
          kubectl -n miniurl get pods -o wide

          GW_IP=$(kubectl -n miniurl get svc api-gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          if [ -z "$GW_IP" ]; then
            GW_IP=$(kubectl -n miniurl get svc api-gateway -o jsonpath='{.spec.clusterIP}')
          fi
          if [ -n "$GW_IP" ]; then
            echo "--- API Gateway @ ${GW_IP} ---"
            curl -fsS "http://${GW_IP}/actuator/health" || echo "WARN: Health check failed"
            curl -fsS "http://${GW_IP}/.well-known/jwks.json" | head -c 200 || echo "WARN: JWKS failed"
          fi

          REDIR_IP=$(kubectl -n miniurl get svc redirect-service -o jsonpath='{.spec.clusterIP}')
          if [ -n "$REDIR_IP" ]; then
            echo "--- Redirect Service @ ${REDIR_IP} ---"
            curl -fsS -o /dev/null -w "Redirect (404 expected): %{http_code}\n" "http://${REDIR_IP}/r/nonexistent"
          fi

          echo "=== Smoke Test Complete ==="

      - name: Print access info
        run: |
          echo "============================================"
          echo "  Dev Deploy Complete"
          echo "============================================"
          echo "Tag: ${{ steps.tag.outputs.IMAGE_TAG }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Services:"
          kubectl -n miniurl get svc
          echo ""
          echo "Ingress:"
          kubectl -n miniurl get ingress
          echo ""
          echo "To access from your machine, add to /etc/hosts:"
          echo "  <server-ip>  miniurl.local"
          echo "Then open: http://miniurl.local/api/health"
