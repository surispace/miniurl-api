name: Release - Publish to Docker Hub & Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          # Strip 'v' prefix: v1.0.0 -> 1.0.0
          VERSION="${TAG_NAME#v}"
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Verify branch is main or master
        run: |
          BRANCH=$(git branch -r --contains "${{ github.ref }}" | grep -E 'origin/(main|master)' | head -1 || true)
          if [ -z "$BRANCH" ]; then
            echo "Tag is not on main or master branch. Skipping."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_API_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — individual service images
        env:
          VERSION: ${{ steps.tag.outputs.VERSION }}
        run: |
          REGISTRY="ghcr.io/${{ github.repository }}"
          DOCKER_USER="${{ secrets.DOCKER_USER }}"
          SERVICES="eureka-server api-gateway identity-service url-service redirect-service feature-service notification-service analytics-service"

          for service in $SERVICES; do
            # Multi-arch build to ghcr.io with version tag + latest
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --target "$service" \
              --push \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              -t "${REGISTRY}/${service}:${VERSION}" \
              -t "${REGISTRY}/${service}:latest" \
              -t "${DOCKER_USER}/miniurl-api:${service}-${VERSION}" \
              .
          done

      - name: Create notification issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.tag.outputs.VERSION }}';
            const registry = `ghcr.io/${{ github.repository }}`;
            const services = ['eureka-server','api-gateway','identity-service','url-service','redirect-service','feature-service','notification-service','analytics-service'];
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const imageList = services.map(s => `- \`${registry}/${s}:${version}\``).join('\n');
            const body = `**Release ${version}** has been built and published!\n\n**Images:**\n${imageList}\n\n🔗 [View Build Log](${runUrl})`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release ${version}: Docker images published`,
              body: body,
              labels: ['release', 'docker']
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.tag.outputs.VERSION }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release failed: ${version}`,
              body: `The Docker image build for \`${version}\` failed.\n\n🔗 [View Build Log](${runUrl})`,
              labels: ['release', 'failed-build']
            });
