        target:
          type: Utilization
          averageUtilization: 80

---
# ============================================
# INGRESS
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miniurl-ingress
  namespace: miniurl
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.miniurl.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: redirect-service
                port:
                  number: 8082
    - host: miniurl.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80