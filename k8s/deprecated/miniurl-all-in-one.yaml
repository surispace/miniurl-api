# Kubernetes Deployment Manifests for MyURL Microservices
# Namespace: miniurl
# Apply with: kubectl apply -f k8s/

# ============================================
# NAMESPACE
# ============================================
apiVersion: v1
kind: Namespace
metadata:
  name: miniurl
  labels:
    name: miniurl
    managed-by: kubectl

---
# ============================================
# CONFIGMAPS
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: global-config
  namespace: miniurl
data:
  # Application Configuration
  SPRING_PROFILES_ACTIVE: "prod"
  APP_BASE_URL: "http://api.miniurl.com"
  APP_UI_BASE_URL: "http://miniurl.com"
  APP_NAME: "MyURL"
  
  # Service Discovery
  EUREKA_SERVER_URL: "http://eureka-server.miniurl.svc.cluster.local:8761/eureka/"
  
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service.miniurl.svc.cluster.local:9092"
  
  # Redis Configuration
  REDIS_HOST: "redis.miniurl.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Database Configuration (defaults - overridden by secrets)
  MYSQL_URL_HOST: "mysql-url.miniurl.svc.cluster.local"
  MYSQL_URL_PORT: "3306"
  MYSQL_URL_DB: "url_db"
  MYSQL_IDENTITY_HOST: "mysql-identity.miniurl.svc.cluster.local"
  MYSQL_IDENTITY_PORT: "3306"
  MYSQL_IDENTITY_DB: "identity_db"
  MYSQL_FEATURE_HOST: "mysql-feature.miniurl.svc.cluster.local"
  MYSQL_FEATURE_PORT: "3306"
  MYSQL_FEATURE_DB: "feature_db"
  MYSQL_ANALYTICS_HOST: "mysql-analytics.miniurl.svc.cluster.local"
  MYSQL_ANALYTICS_PORT: "3306"
  MYSQL_ANALYTICS_DB: "analytics_db"

---
# ============================================
# SECRETS
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: miniurl
type: Opaque
stringData:
  # MySQL Root Passwords (change these in production!)
  MYSQL_ROOT_PASSWORD: "rootpassword123"
  MYSQL_URL_PASSWORD: "urlpassword123"
  MYSQL_IDENTITY_PASSWORD: "identitypassword123"
  MYSQL_FEATURE_PASSWORD: "featurepassword123"
  MYSQL_ANALYTICS_PASSWORD: "analyticspassword123"

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secrets
  namespace: miniurl
type: Opaque
stringData:
  # JWT Secret (generate a secure one!)
  JWT_SECRET: "your-secure-jwt-secret-key-minimum-32-characters-long"
  JWT_EXPIRATION_MS: "3600000"

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: miniurl
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "admin123"

---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-secrets
  namespace: miniurl
type: Opaque
stringData:
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-password"

---
# ============================================
# PERSISTENT VOLUME CLAIMS (PVCs)
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-url-pvc
  namespace: miniurl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-identity-pvc
  namespace: miniurl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-feature-pvc
  namespace: miniurl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-analytics-pvc
  namespace: miniurl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# ============================================
# INFRASTRUCTURE SERVICES
# ============================================
# MySQL URL Service
apiVersion: v1
kind: Service
metadata:
  name: mysql-url
  namespace: miniurl
spec:
  selector:
    app: mysql-url
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-url
  namespace: miniurl
spec:
  serviceName: mysql-url
  replicas: 1
  selector:
    matchLabels:
      app: mysql-url
  template:
    metadata:
      labels:
        app: mysql-url
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: "url_db"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: MYSQL_URL_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-url-pvc

---
