server:
  port: 8082

spring:
  application:
    name: redirect-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://identity-service:8085/.well-known/jwks.json}
  data:
    redis:
      host: ${REDIRECT_REDIS_HOST:localhost}
      port: ${REDIRECT_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:${EUREKA_URL:http://eureka-server:8761/eureka/}}

# Swagger/OpenAPI — enabled by default (non-prod)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
